<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">User Dashboard</div>

<div class="container">

    <button onclick="logout()">Logout</button>

    <h2>Your Fees</h2>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="feesTable"></tbody>
    </table>

</div>

<script>

const token = localStorage.getItem("token");

// 🔐 ROLE CHECK
const role = localStorage.getItem("role");
if (role !== "USER") {
    alert("Access Denied");
    window.location.href = "/login.html";
}

// 🚀 LOAD FEES
async function loadFees() {

    const response = await fetch("http://localhost:9081/fees", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await response.json();

    let html = "";

    data.forEach(fee => {

        html += `
            <tr>
                <td>${fee.feeId}</td>
                <td>${fee.amount}</td>
                <td style="color:${fee.status === 'PAID' ? 'green' : 'red'}">
                    ${fee.status}
                </td>
                <td>
                    ${
                        fee.status === 'PENDING'
                        ? `<button onclick="payFee(${fee.feeId})">Pay</button>`
                        : '✔'
                    }
                </td>
            </tr>
        `;
    });

    document.getElementById("feesTable").innerHTML = html;
}

// 💳 PAY FEE
async function payFee(id) {

    const response = await fetch(`http://localhost:9081/fees/pay/${id}`, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (response.status === 200) {
        alert("Payment Successful ✅");
        loadFees();
    } else {
        alert("Payment Failed ❌");
    }
}

// 🚪 LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

// 🔥 INIT
loadFees();

</script>

</body>
</html>
