<!DOCTYPE html>
<html>
<head>
    <title>Fees Data</title>
</head>
<body>

    <h2>Fees List</h2>
    <div id="fees">Loading...</div>

    <script>
        async function loadFees() {
            try {
                const response = await fetch("/fees"); // IMPORTANT CHANGE
                const data = await response.json();

                console.log("API DATA:", data);

                let output = "";

                data.forEach(fee => {
                    output += `
                        <div style="margin-bottom:15px;">
                            <b>Amount:</b> ${fee.amount} <br>
                            <b>Status:</b> ${fee.status} <br>
                        </div>
                    `;
                });

                document.getElementById("fees").innerHTML = output;

            } catch (error) {
                console.error("Error:", error);
                document.getElementById("fees").innerHTML = "Error loading data";
            }
        }

        loadFees();
    </script>

</body>
</html>
