<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">Admin Dashboard</div>

<div class="container">

    <button onclick="logout()">Logout</button>

    <h2>Total Fees</h2>
    <h3 id="totalFees">0</h3>

    <h2>Fees Data</h2>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="feesTable"></tbody>
    </table>

</div>

<script>

const token = localStorage.getItem("token");

// 🔐 ROLE CHECK
const role = localStorage.getItem("role");
if (role !== "ADMIN") {
    alert("Access Denied");
    window.location.href = "/login.html";
}

// 🚀 LOAD FEES
async function loadFees() {

    const response = await fetch("http://localhost:9081/fees", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await response.json();

    let total = 0;
    let html = "";

    data.forEach(fee => {

        total += fee.amount;

        html += `
            <tr>
                <td>${fee.feeId}</td>
                <td>${fee.amount}</td>
                <td style="color:${fee.status === 'PAID' ? 'green' : 'red'}">
                    ${fee.status}
                </td>
            </tr>
        `;
    });

    document.getElementById("feesTable").innerHTML = html;
    document.getElementById("totalFees").innerText = total;
}

// 🚪 LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

// 🔥 INIT
loadFees();

</script>

</body>
</html>
